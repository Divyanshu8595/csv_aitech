version: "3.9"

services:
  # ──────────────────────────────────────────
  # Backend — Express + TypeScript API
  # ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Frontend — Next.js UI
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
